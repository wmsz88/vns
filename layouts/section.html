{{ define "main" }}
<article class="article-main">
  <h1>
    <i class="fas fa-hashtag"></i>&nbsp;{{ .Title }}<sup id="busuanzi_value_page_pv"></sup>
  </h1>
  {{ .Content }}

  {{ $paginator := .Paginate .Pages }}
  <div class="post-grid">
    {{ range $paginator.Pages }}
    {{ partial "post-card.html" . }}
    {{ end }}
  </div>

  {{ partial "pagination.html" . }}
  <p class="articles-len">总共有 {{ len .Pages }} 部资源</p>
</article>
{{ end }}
