<script>
  const swup = new Swup({
    containers: ["#swup", "header", "footer", "#hdrDrawer", ".page-qr"],
    linkSelector: "a[href]:not([data-no-swup])",
    plugins: [
      new SwupParallelPlugin({ containers: ['#swup'] }),
      new SwupPreloadPlugin(),
      new SwupScrollPlugin(),
      new SwupA11yPlugin(),
      new SwupProgressPlugin(),
      new SwupHeadPlugin({
        persistAssets: true,
        persistTags: 'link[rel="stylesheet"], script[src], style',
      }),
      new SwupBodyClassPlugin(),
    ],
  });
</script>
{{ partialCached "head/js.html" . }}

  </button>
  <button id="back-to-top" class="fab-btn" title="返回顶部" aria-label="返回页面顶部">
    <i class="fa fa-angles-up" aria-hidden="true"></i>
  </button>
</div>
