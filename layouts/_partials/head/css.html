{{- /* 使用预编译的 CSS（兼容 Dart Sass 不可用的环境，如 Vercel Linux） */ -}}
{{- $base := resources.Get "css/base.css" }}
{{- if hugo.IsDevelopment }}
<link rel="stylesheet" href="{{ $base.RelPermalink }}" fetchpriority="high" />
{{- else }}
  {{- with $base | minify | fingerprint }}
<link rel="stylesheet" href="{{ .RelPermalink }}" fetchpriority="high" integrity="{{ .Data.Integrity }}"
  crossorigin="anonymous" />
  {{- end }}
{{- end }}
