[markup.goldmark.renderer]
unsafe = true
hardWraps = true
[markup.goldmark.extensions.cjk]
enable = true
eastAsianLineBreaks = true
escapedSpace = true
[markup.tableOfContents]
startLevel = 2
endLevel = 4
ordered = true

[params]
subtitle = 'Galgame 资源站'
description = "Galgame 馆是视觉小说（Visual Novel／Galgame）资源索引站，收录 Windows、Android、PSP 等多平台作品的简介与汉化资源。"
summaryLength = 100
date_format = "1970年01月01日"
mainSections = ["p"]
defaultAuthor = "Admin"
ogImage = "img/logo.svg"
logo = "/img/logo.svg"
contentEdit = "https://github.com/your-username/your-repo/edit/main/content/"
bszAPI = ""

[pagination]
pagerSize = 10
path = "page"

[permalinks]
categories = "/platforms/:title/"
tags = "/tags/:title/"
years = "/year/:title/"

[taxonomies]
category = "categories"
tag = "tags"
year = "years"

[params.postmeta]
enabled = true

[params.comments]
enabled = true
provider = "valine"

[mediaTypes]
[mediaTypes."text/llms"]
suffixes = ["txt"]
[mediaTypes."text/javascript"]
suffixes = ["js"]

[outputFormats.LLMS]
mediaType = "text/llms"
baseName = "llms"
isPlainText = true
permalinkable = false

[outputFormats.SW]
mediaType = "text/javascript"
baseName = "sw"
isPlainText = true
permalinkable = false

[outputs]
home = ["HTML", "RSS", "JSON", "LLMS", "SW"]

# --- Tailwind CSS v4 integration (css.TailwindCSS) ---
# buildStats writes hugo_stats.json listing every class emitted in templates;
# Tailwind scans it (via @source in assets/css/app.css) to generate utilities.
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

# Declaring mounts overrides ONLY the default 'assets' mount, so we re-add it
# explicitly and mount the root hugo_stats.json into the assets filesystem.
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
